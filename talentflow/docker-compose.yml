version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp-bridge:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "3001:3001"
    env_file: .env.local
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - mcp-bridge
    env_file: .env.local
    environment:
      - MCP_BRIDGE_URL=http://mcp-bridge:3001
      - REDIS_URL=redis://redis:6379
    restart: always

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "3002:3002"
    depends_on:
      - redis
      - api
    env_file: .env.local
    environment:
      - REDIS_URL=redis://redis:6379
      - API_URL=http://api:3000
    restart: always
